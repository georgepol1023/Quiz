<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Quiz - Reset League Table</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  .container { background: white; padding: 2.5rem; border-radius: 20px; width: 100%; max-width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); text-align: center; animation: fadeIn .4s ease-out; }
  @keyframes fadeIn { from {opacity: 0; transform: translateY(25px);} to {opacity: 1; transform: translateY(0);} }
  h1 { color: #f44336; font-size: 2rem; font-weight: 700; margin-bottom: 1rem; }
  p { color: #555; font-size: 1.05rem; line-height: 1.6; margin-bottom: 1rem; }
  .warning { background: #fff3e0; border: 1px solid #ffb74d; color: #e65100; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-weight: 600; }
  .btn { display: block; width: 100%; padding: 1rem; border-radius: 12px; font-weight: 600; font-size: 1.1rem; border: none; cursor: pointer; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; margin-bottom: 0.75rem; }
  .btn-danger { background: linear-gradient(135deg, #f44336 0%, #c62828 100%); color: white; }
  .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(244, 67, 54, 0.4); }
  .btn-cancel { background: #eee; color: #555; }
  .btn-cancel:hover { background: #e0e0e0; }
</style>
</head>
<body>
  <div class="container">
    <h1>⚠️ Reset League Table</h1>
    <p>This permanently deletes <strong>every</strong> entry so all candidates start equal at zero points.</p>
    <div class="warning">This action cannot be undone.</div>
    <form method="POST" action="/reset">
      <input type="hidden" name="token" value="{{ token }}">
      <button type="submit" class="btn btn-danger">Yes, reset everything</button>
    </form>
    <a href="/leaderboard" class="btn btn-cancel">Cancel</a>
  </div>
</body>
</html>
